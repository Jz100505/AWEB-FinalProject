<!-- Skip to main content (accessibility) -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="navbar" role="navigation" aria-label="Main navigation" [class.scrolled]="isScrolled">
  <div class="container navbar-inner">

    <!-- Brand — text logo matching page aesthetic -->
    <a routerLink="/home" class="navbar-brand" aria-label="ThriftHub - Go to homepage">
      <span class="navbar-brand-text">THR<span>!</span>FT HUB</span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="navbar-nav" role="list">
      <li>
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
          Home
        </a>
      </li>
      <li>
        <a routerLink="/catalog" routerLinkActive="active" class="nav-link">
          Shop
        </a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" class="nav-link">
          About
        </a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active" class="nav-link">
          Contact
        </a>
      </li>
    </ul>

    <!-- Desktop Actions -->
    <div class="navbar-actions">

      <!-- Search -->
      <button class="nav-icon-btn" aria-label="Search" (click)="toggleSearch()" [attr.aria-expanded]="isSearchOpen">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </button>

      <!-- Cart -->
      <a routerLink="/cart" class="cart-icon" [attr.aria-label]="'Shopping cart, ' + cartCount + ' items'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        <span class="cart-badge" *ngIf="cartCount > 0" aria-live="polite">{{ cartCount }}</span>
      </a>

      <!-- Auth: if not logged in -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" class="btn-nav-login">Log In</a>
        <a routerLink="/register" class="btn-nav-signup">Sign Up</a>
      </ng-container>

      <!-- Auth: if logged in -->
      <ng-container *ngIf="isLoggedIn">
        <div class="user-menu" [class.open]="isUserMenuOpen">
          <button class="user-avatar-btn" (click)="toggleUserMenu()" [attr.aria-expanded]="isUserMenuOpen"
            aria-haspopup="true" aria-label="User menu">
            <span class="user-avatar">{{ userInitial }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" class="chevron">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>

          <ul class="user-dropdown" role="menu" *ngIf="isUserMenuOpen">
            <li role="menuitem">
              <a routerLink="/profile" class="dropdown-item" (click)="closeMenus()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                My Profile
              </a>
            </li>
            <li role="menuitem">
              <a routerLink="/order-history" class="dropdown-item" (click)="closeMenus()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                </svg>
                My Orders
              </a>
            </li>
            <li class="dropdown-divider" role="separator"></li>
            <li role="menuitem">
              <button class="dropdown-item danger" (click)="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Log Out
              </button>
            </li>
          </ul>
        </div>
      </ng-container>

      <!-- Mobile Hamburger -->
      <button class="hamburger" [class.open]="isMobileMenuOpen" (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen" aria-controls="mobile-menu" aria-label="Toggle mobile menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </div>

  <!-- Search Bar Dropdown -->
  <div class="search-bar" [class.open]="isSearchOpen" role="search">
    <div class="container">
      <div class="search-inner">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" class="search-icon-input">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="search" class="search-input" placeholder="Search thrift items, sizes, categories…"
          [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" aria-label="Search products" #searchInput />
        <button class="btn-search-submit" (click)="onSearch()">Search</button>
        <button class="nav-icon-btn" (click)="toggleSearch()" aria-label="Close search">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu" [class.open]="isMobileMenuOpen" role="dialog"
    aria-label="Mobile navigation menu" [attr.aria-hidden]="!isMobileMenuOpen">

    <ul class="mobile-nav" role="list">
      <li>
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          class="mobile-nav-link" (click)="closeMobileMenu()">Home</a>
      </li>
      <li>
        <a routerLink="/catalog" routerLinkActive="active" class="mobile-nav-link" (click)="closeMobileMenu()">Shop</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" class="mobile-nav-link" (click)="closeMobileMenu()">About</a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active" class="mobile-nav-link"
          (click)="closeMobileMenu()">Contact</a>
      </li>
    </ul>

    <div class="mobile-auth" *ngIf="!isLoggedIn">
      <a routerLink="/login" class="btn-mobile-login" (click)="closeMobileMenu()">Log In</a>
      <a routerLink="/register" class="btn-mobile-signup" (click)="closeMobileMenu()">Sign Up</a>
    </div>

    <div class="mobile-auth" *ngIf="isLoggedIn">
      <a routerLink="/profile" class="btn-mobile-login" (click)="closeMobileMenu()">My Profile</a>
      <a routerLink="/order-history" class="btn-mobile-login" (click)="closeMobileMenu()">My Orders</a>
      <button class="btn-mobile-danger" (click)="logout()">Log Out</button>
    </div>

  </div>

  <!-- Mobile backdrop -->
  <div class="mobile-backdrop" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()" aria-hidden="true"></div>

</nav>
