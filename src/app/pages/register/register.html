<div class="register-page">

    <!-- Decorative background blobs -->
    <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--2" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--3" aria-hidden="true"></div>

    <div class="register-card">

        <!-- Logo -->
        <a routerLink="/" class="register-logo" aria-label="ThriftHub home">
            <img src="assets/images/th-logo-black.svg" alt="ThriftHub" />
        </a>

        <!-- Heading -->
        <div class="register-heading">
            <h1>Create an account</h1>
            <p>Join ThriftHub and start thrifting today</p>
        </div>

        <!-- Error alert -->
        <div class="alert alert-error" *ngIf="errorMsg" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMsg }}
        </div>

        <!-- Success alert -->
        <div class="alert alert-success" *ngIf="successMsg" role="status">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            {{ successMsg }}
        </div>

        <!-- Form -->
        <form class="register-form" (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>

            <!-- Full Name -->
            <div class="form-group">
                <label class="form-label" for="fullName">Full name</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <input id="fullName" type="text" class="form-control" placeholder="Juan dela Cruz"
                        [(ngModel)]="fullName" name="fullName" autocomplete="name" required />
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <input id="email" type="email" class="form-control" placeholder="you@example.com"
                        [(ngModel)]="email" name="email" autocomplete="email" required />
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input id="password" [type]="showPass ? 'text' : 'password'" class="form-control"
                        placeholder="At least 8 characters" [(ngModel)]="password" name="password"
                        autocomplete="new-password" required />
                    <button type="button" class="pass-toggle" (click)="togglePass()"
                        [attr.aria-label]="showPass ? 'Hide password' : 'Show password'">
                        <!-- Eye open -->
                        <svg *ngIf="!showPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <!-- Eye closed -->
                        <svg *ngIf="showPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <!-- Password strength indicator -->
                <div class="password-strength" *ngIf="password.length > 0">
                    <div class="strength-bar">
                        <div class="strength-fill" [ngClass]="passwordStrengthClass"></div>
                    </div>
                    <span class="strength-label" [ngClass]="passwordStrengthClass">{{ passwordStrengthLabel }}</span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <input id="confirmPassword" [type]="showConfirmPass ? 'text' : 'password'" class="form-control"
                        placeholder="Re-enter your password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        autocomplete="new-password" required />
                    <button type="button" class="pass-toggle" (click)="toggleConfirmPass()"
                        [attr.aria-label]="showConfirmPass ? 'Hide confirm password' : 'Show confirm password'">
                        <svg *ngIf="!showConfirmPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg *ngIf="showConfirmPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
                <!-- Match indicator -->
                <p class="field-hint field-hint--error"
                    *ngIf="confirmPassword.length > 0 && password !== confirmPassword">
                    Passwords do not match.
                </p>
                <p class="field-hint field-hint--success"
                    *ngIf="confirmPassword.length > 0 && password === confirmPassword && confirmPassword !== ''">
                    Passwords match.
                </p>
            </div>

            <!-- Terms agreement -->
            <div class="form-check">
                <label class="check-label">
                    <input type="checkbox" class="check-input" [(ngModel)]="agreedToTerms" name="agreedToTerms" />
                    <span class="check-box"></span>
                    I agree to the
                    <a routerLink="/terms" class="terms-link">Terms of Service</a>
                    and
                    <a routerLink="/privacy" class="terms-link">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="isLoading">
                <span *ngIf="!isLoading">Create Account</span>
                <span *ngIf="isLoading" class="btn-loading">
                    <svg class="spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                    </svg>
                    Creating account…
                </span>
            </button>

        </form>

        <!-- Divider -->
        <div class="register-divider">
            <span>Already have an account?</span>
        </div>

        <!-- Login link -->
        <a routerLink="/login" class="btn btn-secondary btn-full">
            Sign In
        </a>

    </div>

</div>
