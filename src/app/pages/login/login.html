<div class="login-page">

    <!-- Decorative background blobs -->
    <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

    <div class="login-card">

        <!-- Logo -->
        <a routerLink="/" class="login-logo" aria-label="ThriftHub home">
            <img src="assets/images/th-logo-black.svg" alt="ThriftHub" />
        </a>

        <!-- Heading -->
        <div class="login-heading">
            <h1>Welcome back</h1>
            <p>Sign in to your ThriftHub account</p>
        </div>

        <!-- Error alert -->
        <div class="alert alert-error" *ngIf="errorMsg" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{ errorMsg }}
        </div>

        <!-- Form -->
        <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <input id="email" type="email" class="form-control" placeholder="you@example.com"
                        [(ngModel)]="email" name="email" autocomplete="email" required />
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="label-row">
                    <label class="form-label" for="password">Password</label>
                </div>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input id="password" [type]="showPass ? 'text' : 'password'" class="form-control"
                        placeholder="Enter your password" [(ngModel)]="password" name="password"
                        autocomplete="current-password" required />
                    <button type="button" class="pass-toggle" (click)="togglePass()"
                        [attr.aria-label]="showPass ? 'Hide password' : 'Show password'">
                        <!-- Eye open -->
                        <svg *ngIf="!showPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <!-- Eye closed -->
                        <svg *ngIf="showPass" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" aria-hidden="true">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember me -->
            <div class="form-check">
                <label class="check-label">
                    <input type="checkbox" class="check-input" [(ngModel)]="remember" name="remember" />
                    <span class="check-box"></span>
                    Keep me signed in
                </label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="isLoading">
                <span *ngIf="!isLoading">Sign In</span>
                <span *ngIf="isLoading" class="btn-loading">
                    <svg class="spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                    </svg>
                    Signing in…
                </span>
            </button>

        </form>

        <!-- Divider -->
        <div class="login-divider">
            <span>Don't have an account?</span>
        </div>

        <!-- Register link -->
        <a routerLink="/register" class="btn btn-secondary btn-full">
            Create an Account
        </a>

    </div>

</div>
